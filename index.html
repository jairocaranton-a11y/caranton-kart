<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Caranton Kart 🏎️</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#000;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;}
    #gameCanvas{display:block;width:100vw;height:100vh;}

    /* HUD */
    #hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;display:none;}
    #lapBox{position:absolute;top:14px;left:14px;background:rgba(0,0,0,.7);border-radius:12px;padding:7px 14px;color:#fff;font-size:18px;font-weight:900;border:2px solid rgba(255,255,255,.22);}
    #lapBox span{color:#FFD700;}
    #timerBox{position:absolute;top:14px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.7);border-radius:12px;padding:7px 18px;color:#fff;font-size:18px;font-weight:900;border:2px solid rgba(255,255,255,.22);white-space:nowrap;}
    #posBox{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.7);border-radius:12px;padding:5px 16px;font-size:38px;font-weight:900;color:#FFD700;border:2px solid rgba(255,215,0,.3);}
    #speedBox{position:absolute;bottom:14px;right:14px;background:rgba(0,0,0,.7);border-radius:12px;padding:7px 18px;color:#fff;font-size:22px;font-weight:900;border:2px solid rgba(255,255,255,.22);}
    #minimapBox{position:absolute;bottom:14px;left:14px;background:rgba(0,0,0,.55);border-radius:50%;border:2px solid rgba(255,255,255,.3);}
    #itemHud{position:absolute;top:62px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:3px;}
    #itemSlot{width:54px;height:54px;border-radius:12px;background:rgba(0,0,0,.7);border:3px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;font-size:30px;}
    #itemSlot.ready{border-color:#FFD700;animation:pulse .7s infinite alternate;}
    #itemLabel{color:rgba(255,255,255,.75);font-size:9px;font-weight:700;letter-spacing:1px;}
    #boostBar{position:absolute;top:126px;left:50%;transform:translateX(-50%);width:110px;height:7px;background:rgba(255,255,255,.18);border-radius:4px;display:none;}
    #boostFill{height:100%;background:linear-gradient(90deg,#00ffaa,#00aaff);border-radius:4px;}
    @keyframes pulse{from{box-shadow:0 0 8px rgba(255,215,0,.4);}to{box-shadow:0 0 20px rgba(255,215,0,1);}}

    /* RECORD FLASH */
    #recordFlash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#FFD700,#FF8C00);color:#000;font-size:clamp(22px,5vw,38px);font-weight:900;padding:16px 32px;border-radius:16px;display:none;z-index:300;pointer-events:none;box-shadow:0 0 40px rgba(255,215,0,.8);}

    /* MENU */
    #menu{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(160deg,#0d0028,#1a0066 40%,#003399 80%,#0055cc);display:flex;flex-direction:column;align-items:center;justify-content:center;}
    #menuTitle{font-size:clamp(32px,7vw,68px);font-weight:900;letter-spacing:3px;color:#FFD700;text-shadow:4px 4px 0 #FF4500,8px 8px 0 rgba(0,0,0,.4);margin-bottom:5px;}
    #menuSub{color:rgba(255,255,255,.75);font-size:clamp(12px,2.2vw,18px);margin-bottom:24px;letter-spacing:2px;}

    /* TRACK SELECT */
    #trackSelect{display:flex;gap:clamp(12px,3vw,24px);margin-bottom:24px;}
    .trackCard{background:rgba(255,255,255,.08);border:3px solid transparent;border-radius:16px;padding:clamp(14px,2.5vw,20px) clamp(18px,3vw,28px);cursor:pointer;transition:all .2s;text-align:center;min-width:clamp(120px,20vw,160px);}
    .trackCard:hover,.trackCard.sel{border-color:#FFD700;background:rgba(255,215,0,.15);transform:translateY(-3px);box-shadow:0 8px 24px rgba(255,215,0,.25);}
    .trackEmoji{font-size:clamp(28px,5vw,44px);display:block;margin-bottom:6px;}
    .trackName{color:#fff;font-size:clamp(12px,2vw,16px);font-weight:900;}
    .trackDesc{color:rgba(255,255,255,.55);font-size:clamp(10px,1.5vw,13px);margin-top:3px;}

    /* CHAR SELECT */
    #charGrid{display:flex;gap:clamp(8px,1.5vw,16px);flex-wrap:wrap;justify-content:center;margin-bottom:28px;}
    .charCard{background:rgba(255,255,255,.08);border:3px solid transparent;border-radius:16px;padding:clamp(10px,1.8vw,16px);text-align:center;cursor:pointer;transition:all .2s;width:clamp(100px,15vw,130px);}
    .charCard:hover,.charCard.sel{border-color:#FFD700;background:rgba(255,215,0,.18);transform:translateY(-3px);box-shadow:0 6px 20px rgba(255,215,0,.28);}
    .charAv{width:clamp(56px,8vw,78px);height:clamp(56px,8vw,78px);border-radius:50%;margin:0 auto 8px;border:3px solid rgba(255,255,255,.65);display:flex;align-items:center;justify-content:center;font-size:clamp(22px,3.5vw,34px);font-weight:900;color:#fff;overflow:hidden;}
    .charAv img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .charName{color:#fff;font-size:clamp(11px,1.6vw,14px);font-weight:900;margin-bottom:4px;}
    .charBest{color:#FFD700;font-size:clamp(9px,1.2vw,11px);letter-spacing:.5px;}
    #btnStart{background:linear-gradient(180deg,#FFE033,#FF8C00);color:#1a0033;font-size:clamp(15px,2.5vw,22px);font-weight:900;padding:clamp(11px,1.5vw,15px) clamp(26px,5vw,48px);border:none;border-radius:12px;cursor:pointer;letter-spacing:3px;box-shadow:0 5px 0 #a05000,0 8px 20px rgba(255,140,0,.4);transition:all .1s;}
    #btnStart:hover{transform:translateY(-2px);}
    #btnStart:active{transform:translateY(3px);box-shadow:0 2px 0 #a05000;}

    /* COUNTDOWN */
    #countdown{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(80px,18vw,130px);font-weight:900;color:#fff;text-shadow:4px 4px 0 #000;display:none;z-index:200;pointer-events:none;animation:popIn .45s cubic-bezier(.2,1.5,.5,1);}
    #wrongWayBanner{position:fixed;top:18%;left:50%;transform:translateX(-50%);background:#cc0000;color:#fff;font-size:clamp(22px,5vw,38px);font-weight:900;letter-spacing:3px;padding:10px 36px;border-radius:12px;border:3px solid #ff4444;box-shadow:0 0 24px rgba(255,0,0,.7);display:none;z-index:180;pointer-events:none;animation:wrongWayBlink 0.55s step-end infinite;}
    @keyframes wrongWayBlink{0%,100%{opacity:1;}50%{opacity:0.25;}}
    #itemPopup{position:fixed;top:38%;left:50%;transform:translate(-50%,-50%);font-size:72px;display:none;z-index:150;pointer-events:none;animation:popIn .4s cubic-bezier(.2,1.5,.5,1);}
    @keyframes popIn{from{transform:translate(-50%,-50%) scale(2.5);opacity:0;}to{transform:translate(-50%,-50%) scale(1);opacity:1;}}

    /* PODIO */
    #podiumScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(0,0,0,.92),rgba(10,0,30,.96));display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;z-index:100;}
    #podiumTitle{color:#FFD700;font-size:clamp(28px,6vw,54px);font-weight:900;text-shadow:3px 3px 0 #a05000;margin-bottom:8px;}
    #podiumStage{display:flex;align-items:flex-end;gap:10px;margin-bottom:12px;}
    .podSlot{display:flex;flex-direction:column;align-items:center;gap:5px;}
    .podAv{width:clamp(44px,8vw,68px);height:clamp(44px,8vw,68px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,3vw,26px);font-weight:900;color:#fff;overflow:hidden;border:3px solid rgba(255,255,255,.6);}
    .podAv img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
    .podName{color:#fff;font-size:clamp(11px,1.8vw,15px);font-weight:900;}
    .podTime{color:rgba(255,255,255,.65);font-size:clamp(9px,1.3vw,12px);}
    .podBlock{border-radius:8px 8px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:10px;font-size:clamp(20px,4vw,32px);}
    .podBlock.p1{width:clamp(70px,12vw,100px);height:clamp(90px,14vw,120px);background:linear-gradient(180deg,#FFD700,#cc8800);}
    .podBlock.p2{width:clamp(62px,10vw,88px);height:clamp(72px,11vw,96px);background:linear-gradient(180deg,#aaaaaa,#666);}
    .podBlock.p3{width:clamp(56px,9vw,78px);height:clamp(56px,9vw,76px);background:linear-gradient(180deg,#cd7f32,#7a4010);}
    #pod4Row{color:rgba(255,255,255,.6);font-size:clamp(11px,1.8vw,15px);font-weight:700;margin-bottom:8px;}
    #podNewRecord{color:#FFD700;font-size:clamp(14px,2.5vw,20px);font-weight:900;height:28px;}
    #btnRestart{background:#FFD700;color:#000;font-size:clamp(14px,2vw,18px);font-weight:900;padding:12px 40px;border:none;border-radius:10px;cursor:pointer;box-shadow:0 4px 0 #a05000;margin-top:4px;}
    #btnRestart:hover{background:#FFE566;}

    /* CONTROLES MÓVIL */
    #joystickArea{display:none;position:fixed;inset:0;z-index:50;pointer-events:none;}
    /* Flechas izquierda */
    #joyLeftBtns{position:absolute;bottom:22px;left:14px;display:flex;gap:10px;pointer-events:none;}
    .joyArrow{width:72px;height:72px;border-radius:16px;background:rgba(255,255,255,.1);border:2.5px solid rgba(255,255,255,.28);display:flex;align-items:center;justify-content:center;font-size:32px;pointer-events:all;touch-action:none;user-select:none;-webkit-user-select:none;active:opacity:.7;}
    .joyArrow:active{background:rgba(255,255,255,.25);}
    /* Botones derecha */
    #joyRightBtns{position:absolute;bottom:22px;right:14px;display:flex;flex-direction:column;align-items:center;gap:10px;pointer-events:none;}
    #joyItemBtn{width:56px;height:56px;border-radius:14px;background:rgba(255,215,0,.18);border:2px solid rgba(255,215,0,.5);display:flex;align-items:center;justify-content:center;font-size:24px;pointer-events:all;touch-action:none;user-select:none;-webkit-user-select:none;}
    #joyPedals{display:flex;gap:10px;}
    #joyBrakeBtn{width:64px;height:64px;border-radius:50%;background:rgba(255,60,60,.18);border:2.5px solid rgba(255,60,60,.5);display:flex;align-items:center;justify-content:center;font-size:28px;pointer-events:all;touch-action:none;user-select:none;-webkit-user-select:none;}
    #joyGasBtn{width:80px;height:80px;border-radius:50%;background:rgba(60,220,110,.2);border:2.5px solid rgba(60,220,110,.55);display:flex;align-items:center;justify-content:center;font-size:36px;pointer-events:all;touch-action:none;user-select:none;-webkit-user-select:none;}
  </style>
</head>

<script>
// ── Auto-actualización: si el servidor tiene una versión más nueva que la
//    copia en caché, recargar una sola vez (sin URLs ?v=) ──
(async()=>{
  try{
    const last=+sessionStorage.getItem('ck_upd')||0;
    if(Date.now()-last<120000)return; // evitar bucles de recarga
    const[cached,fresh]=await Promise.all([
      fetch(location.pathname).then(r=>r.text()),
      fetch(location.pathname,{cache:'no-store'}).then(r=>r.text())
    ]);
    if(cached!==fresh){sessionStorage.setItem('ck_upd',Date.now());location.reload();}
  }catch(e){/* sin conexión: seguir con la copia local */}
})();
</script>
<script type="module">
import * as THREE from 'three';

// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const CHARS = [
  {name:'Santiago',color:0xFFD700,hex:'#FFD700',initial:'SA',photo:'fotos/santiago.png',speed:1.0},
  {name:'Liam',    color:0x2299FF,hex:'#2299FF',initial:'LI',photo:'fotos/liam.png',    speed:1.05},

const TRACKS = [
  {
    name:'Pista Clásica', emoji:'🏁', desc:'Circuito ovalado · sin obstáculos',
    pts:[[0,-62],[25,-58],[52,-40],[64,-10],[58,22],[42,50],[14,62],[-14,62],[-42,50],[-58,22],[-64,-10],[-52,-40],[-25,-58]],
    sky:{bg:0x87CEEB,fog:0x87CEEB,ambInt:0.7,sunInt:1.4,sunPos:[60,100,40],sunCol:0xfffae0},

    sky:{bg:0xFF7043,fog:0xFF5533,ambInt:0.45,sunInt:0.9,sunPos:[80,18,-40],sunCol:0xFF6030},
    kerbA:0x2244FF,kerbB:0xffffff,groundCol:0x4a7a28,

  },
  {
    name:'Dunas del Desierto', emoji:'🏜️', desc:'Pista larga y sinuosa · obstáculos · cactus',
    pts:[[0,-108],[40,-104],[74,-90],[98,-64],[100,-32],[84,-8],[102,18],[96,52],[72,78],[40,90],
         [8,84],[-26,94],[-60,86],[-88,64],[-100,34],[-82,10],[-100,-16],[-94,-48],[-106,-76],[-74,-98],[-38,-106]],
    sky:{bg:0xE8C98A,fog:0xE3BE78,ambInt:0.85,sunInt:1.6,sunPos:[40,120,30],sunCol:0xfff2c0},
    kerbA:0xCC5500,kerbB:0xfff2d0,groundCol:0xD9B872,
    treeMinR:124, hasObstacles:true, treeType:'cactus',
    hills:7.0, movingDunes:true,
  },
];

const SKY_PRESET_REFS = TRACKS.map(t=>t.sky);

// Records localStorage
const LS = {
  getBest(ci){ const v=localStorage.getItem(`ck_best_${ci}`); return v?parseFloat(v):null; },
  setBest(ci,ms){ const cur=this.getBest(ci); if(!cur||ms<cur){localStorage.setItem(`ck_best_${ci}`,ms);return true;} return false; },
  fmt(ms){ if(!ms) return '--:--.--'; const m=Math.floor(ms/60000),s=((ms%60000)/1000).toFixed(2).padStart(5,'0'); return `${m}:${s}`; },
};

// Vibración
function vib(pat){ if(navigator.vibrate) navigator.vibrate(pat); }

// ══════════════════════════════════════════
//  MÓVIL + RENDERER
// ══════════════════════════════════════════
const isMobile = ('ontouchstart' in window)||navigator.maxTouchPoints>0;
const canvas = document.getElementById('gameCanvas');
const renderer = new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled = !isMobile;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(65,1,0.1,500);

function onResize(){ const w=window.innerWidth,h=window.innerHeight; renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix(); }
onResize(); window.addEventListener('resize',onResize);

// ══════════════════════════════════════════
//  ILUMINACIÓN (dinámica)
// ══════════════════════════════════════════
const ambientLight = new THREE.AmbientLight(0xffffff,0.4); scene.add(ambientLight);
const hemiLight = new THREE.HemisphereLight(0x87CEEB,0x3e6b2a,0.55); scene.add(hemiLight);
const sun = new THREE.DirectionalLight(0xfffae0,1.4); sun.castShadow=!isMobile;
sun.shadow.camera.near=0.5; sun.shadow.camera.far=300;
sun.shadow.camera.left=-120; sun.shadow.camera.right=120;
sun.shadow.camera.top=120; sun.shadow.camera.bottom=-120;
sun.shadow.mapSize.set(isMobile?512:2048,isMobile?512:2048);
sun.position.set(60,100,40); scene.add(sun);

function applySky(sky){
  scene.background = new THREE.Color(sky.bg);
  scene.fog = new THREE.FogExp2(sky.fog,0.007);
  ambientLight.intensity = sky.ambInt*0.55;
  hemiLight.color.setHex(sky.bg);
  hemiLight.intensity = sky.ambInt*0.75;
  sun.intensity = sky.sunInt;
  sun.color.setHex(sky.sunCol);
  sun.position.set(...sky.sunPos);
}

// ══════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════
let audioCtx=null,engineOsc=null,engineGain=null,bgInterval=null;
const BG_MELODY=[261,294,330,349,392,349,330,294];
let bgIdx=0;

function initAudio(){
  if(audioCtx) return;
  audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  engineOsc=audioCtx.createOscillator(); engineGain=audioCtx.createGain();
  const dist=audioCtx.createWaveShaper();
  const curve=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=(Math.PI+400)*x/(Math.PI+400*Math.abs(x));}
  dist.curve=curve;
  engineOsc.type='sawtooth'; engineOsc.frequency.value=90; engineGain.gain.value=0;
  engineOsc.connect(dist); dist.connect(engineGain); engineGain.connect(audioCtx.destination);
  engineOsc.start();
  bgInterval=setInterval(()=>{
    if(!audioCtx||audioCtx.state==='suspended') return;
    const freq=BG_MELODY[bgIdx++%BG_MELODY.length];
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square'; o.frequency.value=freq;
    g.gain.setValueAtTime(0.04,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.18);
    o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.2);
  },220);
}
function updateEngineSound(spd){
  if(!engineOsc||!engineGain)return;
  const t=audioCtx.currentTime;
  engineOsc.frequency.setTargetAtTime(80+Math.abs(spd)*700,t,0.05);
  engineGain.gain.setTargetAtTime(Math.abs(spd)>0.005?0.06:0.02,t,0.05);
}
function playBeep(freq,dur,vol=0.3){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine'; o.frequency.value=freq;
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+dur+0.05);
}
function playCollisionSound(){
  if(!audioCtx)return;
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const src=audioCtx.createBufferSource(),g=audioCtx.createGain();
  src.buffer=buf; g.gain.value=0.35; src.connect(g); g.connect(audioCtx.destination); src.start();
  vib([40]);
}
function playBoostSound(){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(200,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(800,audioCtx.currentTime+0.3);
  g.gain.setValueAtTime(0.2,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.3);
  o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime+0.35);
}

const TRACK_W=13, TRACK_SEGS=300;
let WAYPTS=[], trackCurve, currentTrackCfg, WAYPT_H=[];

// Altura del terreno a lo largo de la pista (relieve / altibajos)
function computeTrackHeights(amp){
  WAYPT_H=[]; const n=WAYPTS.length;
  for(let i=0;i<n;i++){
    const phi=(i/n)*Math.PI*2;
    const w=0.5*Math.sin(phi*3)+0.32*Math.sin(phi*5+1.3)+0.18*Math.sin(phi*2+0.6); // periódico en el lazo
    WAYPT_H.push(amp*(0.5+0.5*w)); // rango ~0..amp (siempre sobre el suelo)
  }
}
function trackH(idx){ const n=WAYPT_H.length; return n?WAYPT_H[((idx%n)+n)%n]:0; }

// Finish line
let FINISH_A=new THREE.Vector3(),FINISH_B=new THREE.Vector3(),FINISH_FWD=new THREE.Vector3();

function makeAsphaltTexture(){
  const c=document.createElement('canvas');c.width=c.height=256;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#5a5a5e';ctx.fillRect(0,0,256,256);
  // Grano del asfalto (piedritas claras y oscuras)
  for(let i=0;i<2600;i++){
    const v=Math.random();
    ctx.fillStyle=v<0.5?`rgba(0,0,0,${0.12+Math.random()*0.2})`:`rgba(255,255,255,${0.04+Math.random()*0.09})`;
    const s=Math.random()<0.92?1:2;
    ctx.fillRect(Math.random()*256,Math.random()*256,s,s);
  }
  // Marcas de neumáticos (bandas oscuras donde ruedan los karts)
  const band=(cx)=>{const g=ctx.createLinearGradient(cx-26,0,cx+26,0);g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(0.5,'rgba(0,0,0,0.22)');g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(cx-26,0,52,256);};
  band(70);band(186);
  // Borde levemente más claro (desgaste)
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(0,0,10,256);ctx.fillRect(246,0,10,256);
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

function makeGrassTexture(baseCol){
  const c=document.createElement('canvas');c.width=c.height=256;
  const ctx=c.getContext('2d');
  const col=new THREE.Color(baseCol);
  ctx.fillStyle=`rgb(${col.r*255|0},${col.g*255|0},${col.b*255|0})`;ctx.fillRect(0,0,256,256);
  // Parches más claros/oscuros derivados del color base (sirve para pasto y arena)
  const lite=col.clone().multiplyScalar(1.35),dark=col.clone().multiplyScalar(0.6);
  for(let i=0;i<900;i++){
    const c2=Math.random()<0.5?lite:dark;
    ctx.fillStyle=`rgba(${Math.min(255,c2.r*255)|0},${Math.min(255,c2.g*255)|0},${Math.min(255,c2.b*255)|0},0.12)`;
    const r=2+Math.random()*7;
    ctx.beginPath();ctx.ellipse(Math.random()*256,Math.random()*256,r,r*0.55,Math.random()*3,0,Math.PI*2);ctx.fill();
  }
  const tex=new THREE.CanvasTexture(c);
  tex.wrapS=tex.wrapT=THREE.RepeatWrapping;
  tex.repeat.set(40,40);
  tex.colorSpace=THREE.SRGBColorSpace;
  return tex;
}

function buildTrack(trackCfg){
  currentTrackCfg=trackCfg;
  const pts=trackCfg.pts.map(([x,z])=>new THREE.Vector3(x,0,z));
  trackCurve=new THREE.CatmullRomCurve3(pts,true,'catmullrom',0.5);
  WAYPTS=trackCurve.getPoints(TRACK_SEGS);
  computeTrackHeights(trackCfg.hills||0);

  const n=WAYPTS.length;
  const verts=[],uvs=[],normals=[],indices=[];
  for(let i=0;i<n;i++){
    const p=WAYPTS[i],nx=WAYPTS[(i+1)%n];
    const dir=new THREE.Vector3().subVectors(nx,p).normalize();
    const right=new THREE.Vector3(-dir.z,0,dir.x);
    const L=p.clone().addScaledVector(right,-TRACK_W/2);
    const R=p.clone().addScaledVector(right, TRACK_W/2);
    const u=(i/n)*10, hy=trackH(i)+0.02;
    verts.push(L.x,hy,L.z, R.x,hy,R.z);
    uvs.push(0,u,1,u); normals.push(0,1,0,0,1,0);
  }
  for(let i=0;i<n;i++){
    const a=i*2,b=i*2+1,c=((i+1)%n)*2,d=((i+1)%n)*2+1;
    indices.push(a,b,c, b,d,c);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setAttribute('normal',new THREE.Float32BufferAttribute(normals,3));
  geo.setIndex(indices);

  const mesh=new THREE.Mesh(geo,new THREE.MeshLambertMaterial({map:makeAsphaltTexture()}));
  mesh.receiveShadow=!isMobile; scene.add(mesh);

  // Línea de centro
  const lineMat=new THREE.MeshBasicMaterial({color:0xffffff});
  for(let i=0;i<n;i+=5){
    const p=WAYPTS[i],nx=WAYPTS[(i+1)%n];
    const dir=new THREE.Vector3().subVectors(nx,p).normalize();
    const line=new THREE.Mesh(new THREE.PlaneGeometry(0.28,2),lineMat);
    line.rotation.x=-Math.PI/2; line.position.set(p.x,trackH(i)+0.03,p.z);
    line.rotation.y=Math.atan2(dir.x,dir.z); scene.add(line);
  }

  // Bordillos
  for(let i=0;i<n;i+=2){
    const p=WAYPTS[i],nx=WAYPTS[(i+1)%n];
    const dir=new THREE.Vector3().subVectors(nx,p).normalize();
    const right=new THREE.Vector3(-dir.z,0,dir.x);
    const col=Math.floor(i/4)%2===0?trackCfg.kerbA:trackCfg.kerbB;
    const mat=new THREE.MeshLambertMaterial({color:col});
    for(const side of[-1,1]){
      const pos=p.clone().addScaledVector(right,side*(TRACK_W/2+0.6));
      const k=new THREE.Mesh(new THREE.BoxGeometry(1.2,0.22,1.2),mat);
      k.position.set(pos.x,trackH(i)+0.11,pos.z); scene.add(k);
    }
  }

  // Línea de meta
  const sc=document.createElement('canvas');sc.width=256;sc.height=64;
  const sx=sc.getContext('2d');
  for(let i=0;i<8;i++){sx.fillStyle=i%2===0?'#000':'#fff';sx.fillRect(i*32,0,32,32);sx.fillStyle=i%2===0?'#fff':'#000';sx.fillRect(i*32,32,32,32);}
  const startMesh=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W,3),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(sc)}));
  startMesh.rotation.x=-Math.PI/2; startMesh.position.set(WAYPTS[0].x,trackH(0)+0.04,WAYPTS[0].z); scene.add(startMesh);

  setupFinishLine();
}

function setupFinishLine(){
  const fp=WAYPTS[0],fn=WAYPTS[4];
  FINISH_FWD.subVectors(fn,fp).normalize();
  const fr=new THREE.Vector3(-FINISH_FWD.z,0,FINISH_FWD.x);
  FINISH_A.copy(fp).addScaledVector(fr,-(TRACK_W*0.55));
  FINISH_B.copy(fp).addScaledVector(fr, (TRACK_W*0.55));
  buildFinishArch();
}

function buildFinishArch(){
  const mid=FINISH_A.clone().lerp(FINISH_B,0.5);
  const archAngle=Math.atan2(FINISH_B.x-FINISH_A.x,FINISH_B.z-FINISH_A.z);
  const h0=trackH(0);
  const redMat=new THREE.MeshLambertMaterial({color:0xFF2222});
  [FINISH_A,FINISH_B].forEach(p=>{
    const post=new THREE.Mesh(new THREE.CylinderGeometry(0.35,0.35,9,8),redMat);
    post.position.set(p.x,h0+4.5,p.z); scene.add(post);
  });
  const cross=new THREE.Mesh(new THREE.CylinderGeometry(0.25,0.25,TRACK_W*1.1+2,8),redMat);
  cross.rotation.z=Math.PI/2; cross.rotation.y=archAngle; cross.position.set(mid.x,h0+9,mid.z); scene.add(cross);
  const bc=document.createElement('canvas');bc.width=256;bc.height=80;
  const bx=bc.getContext('2d');
  bx.fillStyle='#FFD700';bx.fillRect(0,0,256,80);
  bx.fillStyle='#000';bx.font='bold 48px Arial Black';bx.textAlign='center';bx.textBaseline='middle';
  bx.fillText('🏁 META 🏁',128,40);
  const bm=new THREE.Mesh(new THREE.PlaneGeometry(TRACK_W*1.0,2),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(bc),side:THREE.DoubleSide}));
  bm.position.set(mid.x,h0+9.5,mid.z); bm.rotation.y=archAngle; scene.add(bm);
}

function linesCross(ax,az,bx,bz,cx,cz,dx,dz){
  const d1x=bx-ax,d1z=bz-az,d2x=dx-cx,d2z=dz-cz;
  const den=d1x*d2z-d1z*d2x;
  if(Math.abs(den)<1e-6)return false;
  const t=((cx-ax)*d2z-(cz-az)*d2x)/den;
  const u=((cx-ax)*d1z-(cz-az)*d1x)/den;
  return t>=0&&t<=1&&u>=0&&u<=1;
}

function advanceWaypoint(kart){
  const u=kart.userData;
  // Si el kart se alejó mucho del waypoint actual (ej. salió de pista),
  // buscamos globalmente el waypoint más cercano para re-enganchar.
  const wpCur=WAYPTS[u.wpIdx];
  if(Math.hypot(kart.position.x-wpCur.x,kart.position.z-wpCur.z)>TRACK_W*2.8){
    let minD=Infinity,best=u.wpIdx;
    for(let i=0;i<WAYPTS.length;i++){
      const d=Math.hypot(kart.position.x-WAYPTS[i].x,kart.position.z-WAYPTS[i].z);
      if(d<minD){minD=d;best=i;}
    }
    if(minD<TRACK_W*1.4) u.wpIdx=best;
  }
  for(let i=0;i<4;i++){
    const wp=WAYPTS[u.wpIdx];
    const dx=kart.position.x-wp.x,dz=kart.position.z-wp.z;
    if(Math.sqrt(dx*dx+dz*dz)<TRACK_W*1.0) u.wpIdx=(u.wpIdx+1)%TRACK_SEGS;
    else break;
  }
}

function checkLapCrossing(kart){
  const u=kart.userData;
  if(!u.prevPos){u.prevPos=kart.position.clone();return;}
  const cross=linesCross(u.prevPos.x,u.prevPos.z,kart.position.x,kart.position.z,FINISH_A.x,FINISH_A.z,FINISH_B.x,FINISH_B.z);
  if(cross){
    const mx=kart.position.x-u.prevPos.x,mz=kart.position.z-u.prevPos.z;
    const dot=mx*FINISH_FWD.x+mz*FINISH_FWD.z;
    if(dot>0&&u.passedHalf){
      u.lap++; u.passedHalf=false;
      if(u.lap>=3&&!u.finished){
        u.finished=true;
        u.finishTime=Date.now()-raceStart;
        if(u.isPlayer) resolveRace();
      }
    }
  }
  if(u.wpIdx>TRACK_SEGS*0.45&&u.wpIdx<TRACK_SEGS*0.85) u.passedHalf=true;
  u.prevPos.copy(kart.position);
}

function addBillboard(x,z,scale,kind){
  let tex;
  if(kind==='cactus'){ if(!_cactusTex)_cactusTex=makeCactusTexture(); tex=_cactusTex; }
  else { if(!_treeTex)_treeTex=makeTreeTexture(); tex=_treeTex; }
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,alphaTest:0.15,side:THREE.DoubleSide,depthWrite:false});
  const h=9*scale,w=5*scale;
  const geo=new THREE.PlaneGeometry(w,h);
  const group=new THREE.Group();
  [0,Math.PI/2].forEach(ry=>{const pl=new THREE.Mesh(geo,mat);pl.rotation.y=ry;group.add(pl);});
  group.position.set(x,h/2,z); scene.add(group);
  // Decoración sólo visual (sin colisión)
}

  for(let i=0;i<3;i++){
    const torus=new THREE.Mesh(new THREE.TorusGeometry(0.55,0.27,10,16),tireMat);
    torus.rotation.x=Math.PI/2; torus.position.y=0.3+i*0.57; group.add(torus);

}

function buildTrackObstacles(){

  [0.06,0.19,0.32,0.45,0.58,0.71,0.85].forEach((frac,i)=>{

    const dir=new THREE.Vector3().subVectors(pn,p).normalize();
    const right=new THREE.Vector3(-dir.z,0,dir.x);
    const side=i%2===0?1:-1;
    const pos=p.clone().addScaledVector(right,side*(TRACK_W/2-2.3));
    createTireStack(pos.x,pos.z,trackH(idx));
  });
  // 🕳 Huecos en la superficie de la pista
  [0.12,0.29,0.56,0.79].forEach((frac,i)=>{

    const pos=p.clone().addScaledVector(right,(i%2===0?-1:1)*2.2);
    createPothole(pos.x,pos.z,trackH(idx));
  });
  // 🛢 Manchas de aceite en la pista
  [0.23,0.49,0.74].forEach((frac,i)=>{

  ctx.strokeStyle='rgba(255,255,255,.6)';ctx.lineWidth=4;ctx.beginPath();ctx.arc(64,64,58,0,Math.PI*2);ctx.stroke();

function makeNameTexture(name){
  const c=document.createElement('canvas');c.width=256;c.height=60;const ctx=c.getContext('2d');
  ctx.fillStyle='rgba(0,0,0,.78)';
  const[rx,ry,rw,rh,rr]=[2,2,252,56,12];
  ctx.beginPath();ctx.moveTo(rx+rr,ry);ctx.lineTo(rx+rw-rr,ry);ctx.arcTo(rx+rw,ry,rx+rw,ry+rr,rr);ctx.lineTo(rx+rw,ry+rh-rr);ctx.arcTo(rx+rw,ry+rh,rx+rw-rr,ry+rh,rr);ctx.lineTo(rx+rr,ry+rh);ctx.arcTo(rx,ry+rh,rx,ry+rh-rr,rr);ctx.lineTo(rx,ry+rr);ctx.arcTo(rx,ry,rx+rr,ry,rr);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 34px Arial Black,Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(name,128,30);
  return new THREE.CanvasTexture(c);
}
function lightenHex(hex,pct){const n=parseInt(hex.replace('#',''),16);const r=Math.min(255,((n>>16)&0xff)+pct),g=Math.min(255,((n>>8)&0xff)+pct),b=Math.min(255,(n&0xff)+pct);return `rgb(${r},${g},${b})`;}

    const t=slot*0.018,pos=trackCurve.getPoint(t),tan=trackCurve.getTangent(t);

function isOnGrass(kart){
  const u=kart.userData;let min=Infinity;
  for(let o=-20;o<=20;o++){const idx=(u.wpIdx+o+TRACK_SEGS)%TRACK_SEGS;const wp=WAYPTS[idx];const dx=kart.position.x-wp.x,dz=kart.position.z-wp.z;const d=Math.sqrt(dx*dx+dz*dz);if(d<min)min=d;if(min<3)break;}
  return min>TRACK_W*0.65;
}

// Ajusta altura (relieve) e inclinación del kart según la pendiente de la pista
function applyTerrain(kart){
  const u=kart.userData;
  // Waypoint más cercano a la POSICIÓN real del kart (wpIdx puede ir adelantado)
  let best=u.wpIdx,bd=Infinity;
  for(let o=-25;o<=25;o++){
    const idx=((u.wpIdx+o)%TRACK_SEGS+TRACK_SEGS)%TRACK_SEGS;
    const wp=WAYPTS[idx];
    const dx=kart.position.x-wp.x,dz=kart.position.z-wp.z;
    const d=dx*dx+dz*dz;
    if(d<bd){bd=d;best=idx;}
  }
  // Interpolar altura proyectando sobre el segmento hacia el siguiente waypoint
  const a=WAYPTS[best],b=WAYPTS[(best+1)%TRACK_SEGS];
  const abx=b.x-a.x,abz=b.z-a.z,len2=abx*abx+abz*abz||1;
  let t=((kart.position.x-a.x)*abx+(kart.position.z-a.z)*abz)/len2;
  t=Math.max(0,Math.min(1,t));
  let targetY=trackH(best)*(1-t)+trackH(best+1)*t;
  // Fuera de la pista la altura baja gradualmente al nivel del suelo
  const dist=Math.sqrt(bd),half=TRACK_W*0.55;
  if(dist>half) targetY*=Math.max(0,1-(dist-half)/6);
  kart.position.y+=(targetY-kart.position.y)*0.35;
  const slope=trackH(best+4)-trackH(best-4);
  kart.rotation.x=-slope*0.05;
}

function updatePlayerKart(dt){
  const u=playerKart.userData;if(u.finished)return;
  if(u.oilCooldown>0)u.oilCooldown-=dt;
  const inp=getInput();
  if(u.spinTimer>0){u.spinTimer-=dt;u.angle+=0.15;u.speed*=0.88;}
  else{
    u.speed+=inp.fwd*u.accel;u.speed*=u.friction;
    u.speed=Math.max(-u.maxSpeed*0.45,Math.min(u.maxSpeed,u.speed));
    if(Math.abs(u.speed)>0.003)u.angle+=inp.turn*u.turnRate*Math.sign(u.speed)*Math.min(1,Math.abs(u.speed)/u.maxSpeed*1.8);
  }
  if(isOnGrass(playerKart)){u.speed*=0.94;const gm=u.baseMaxSpeed*0.6;if(Math.abs(u.speed)>gm)u.speed*=0.97;}
  playerKart.position.x+=Math.sin(u.angle)*u.speed;playerKart.position.z+=Math.cos(u.angle)*u.speed;
  playerKart.rotation.y=u.angle;
  playerKart.rotation.z=u.spinTimer>0?Math.sin(Date.now()*0.03)*0.3:(-inp.turn*0.08*Math.min(1,Math.abs(u.speed)/u.maxSpeed));
  playerKart.children.forEach(c=>{if(c.userData.isWheel)c.rotation.x+=u.speed*9;});
  if(u.boostTimer>0){u.boostTimer-=dt;if(u.boostTimer<=0){u.maxSpeed=u.baseMaxSpeed;document.getElementById('boostBar').style.display='none';}else{document.getElementById('boostFill').style.width=(u.boostTimer/3*100)+'%';}}
  advanceWaypoint(playerKart);checkLapCrossing(playerKart);applyTerrain(playerKart);updateEngineSound(u.speed);
}

function updateAI(kart,dt){
  const u=kart.userData;if(u.finished)return;
  if(u.oilCooldown>0)u.oilCooldown-=dt;
  if(u.spinTimer>0){u.spinTimer-=dt;u.angle+=0.12;u.speed*=0.88;}
  else{
    u.mistakeTimer-=dt;if(u.mistakeTimer<=0){u.mistakeTimer=u.mistakeInterval+Math.random()*4;u.sideSpeed=(Math.random()-.5)*0.09;}
    u.sideOffset+=u.sideSpeed;if(Math.abs(u.sideOffset)>3.8)u.sideSpeed*=-1;
    const lookIdx=(u.wpIdx+u.lookAhead)%TRACK_SEGS;
    const wp=WAYPTS[lookIdx],wpN=WAYPTS[(lookIdx+1)%TRACK_SEGS];
    const fwd=new THREE.Vector3(wpN.x-wp.x,0,wpN.z-wp.z).normalize();
    const rdir=new THREE.Vector3(-fwd.z,0,fwd.x);
    const tx=wp.x+rdir.x*u.sideOffset,tz=wp.z+rdir.z*u.sideOffset;
    let diff=Math.atan2(tx-kart.position.x,tz-kart.position.z)-u.angle;
    while(diff>Math.PI)diff-=Math.PI*2;while(diff<-Math.PI)diff+=Math.PI*2;
    const turn=Math.max(-1,Math.min(1,diff/0.45));
    u.speed+=(u.aggression-Math.abs(turn)*0.28)*u.accel;u.speed*=u.friction;u.speed=Math.max(0,Math.min(u.maxSpeed,u.speed));
    u.angle+=turn*u.turnRate;
  }
  if(isOnGrass(kart))u.speed*=0.95;
  kart.position.x+=Math.sin(u.angle)*u.speed;kart.position.z+=Math.cos(u.angle)*u.speed;
  kart.rotation.y=u.angle;kart.children.forEach(c=>{if(c.userData.isWheel)c.rotation.x+=u.speed*9;});
  advanceWaypoint(kart);checkLapCrossing(kart);applyTerrain(kart);
}

// ══════════════════════════════════════════
//  COLISIONES
// ══════════════════════════════════════════
function checkKartCollisions(){
  const DIST=2.6;
  for(let i=0;i<karts.length;i++)for(let j=i+1;j<karts.length;j++){
    const a=karts[i],b=karts[j];
    const dx=a.position.x-b.position.x,dz=a.position.z-b.position.z;
    const dist=Math.sqrt(dx*dx+dz*dz);
    if(dist<DIST&&dist>0.01){
      const ov=(DIST-dist)/DIST,nx=dx/dist,nz=dz/dist;
      const relSpd=Math.abs(a.userData.speed-b.userData.speed)+0.05;
      const force=Math.min(1,ov*1.8*relSpd*8);
      a.position.x+=nx*ov*0.6;a.position.z+=nz*ov*0.6;
      b.position.x-=nx*ov*0.6;b.position.z-=nz*ov*0.6;
      a.userData.speed*=(1-force*0.7);b.userData.speed*=(1-force*0.7);
      if(force>0.35){const w=Math.abs(a.userData.speed)<Math.abs(b.userData.speed)?a:b;w.userData.spinTimer=Math.max(w.userData.spinTimer,0.4+force*0.5);}
      const now=Date.now();if(now-lastCollSnd>300){playCollisionSound();lastCollSnd=now;}
    }
  }
}

function checkObstacleCollisions(){
  const now=Date.now();
  karts.forEach(kart=>{
    obstacleObjects.forEach(obs=>{
      const dx=kart.position.x-obs.x,dz=kart.position.z-obs.z;
      const dist=Math.sqrt(dx*dx+dz*dz);
      if(obs.type==='llanta'){
        // Colisión sólida: rebote y giro
        const min=obs.r+0.9;
        if(dist<min&&dist>0.01){
          const nx=dx/dist,nz=dz/dist;
          kart.position.x=obs.x+nx*min; kart.position.z=obs.z+nz*min;
          kart.userData.speed*=-0.22; kart.userData.spinTimer=Math.max(kart.userData.spinTimer,0.35);
          // Llantas se tambalean al golpe
          if(obs.mesh){obs.mesh.rotation.z=(Math.random()-.5)*0.4;setTimeout(()=>{if(obs.mesh)obs.mesh.rotation.z=0;},380);}
          if(kart.userData.isPlayer&&now-lastCollSnd>300){playCollisionSound();lastCollSnd=now;showObstaclePopup('🏎️ ¡LLANTAS!');}
        }
      } else if(obs.type==='hueco'){
        // Frenazo y pequeño giro
        if(dist<obs.r&&Math.abs(kart.userData.speed)>0.05&&kart.userData.spinTimer<=0){
          kart.userData.speed*=0.72; kart.userData.spinTimer=Math.max(kart.userData.spinTimer,0.3);
          if(kart.userData.isPlayer&&now-lastCollSnd>500){
            playBeep(110,0.25,0.28); lastCollSnd=now; vib([35]);
            showObstaclePopup('🕳️ ¡BACHE!');
          }
        }
      } else if(obs.type==='aceite'){
        // Pérdida de control — con cooldown para poder escapar
        if(dist<obs.r&&Math.abs(kart.userData.speed)>0.04&&kart.userData.spinTimer<=0&&kart.userData.oilCooldown<=0){
          kart.userData.spinTimer=Math.max(kart.userData.spinTimer,1.4);
          kart.userData.oilCooldown=3.8; // inmunidad 3.8s: da tiempo de alejarse
          if(kart.userData.isPlayer&&now-lastCollSnd>400){
            playCollisionSound(); lastCollSnd=now; vib([60,40,60,40,60]);
            showObstaclePopup('🛢️ ¡ACEITE!');
          }
        }
      }
    });
    // 🏜️ Dunas móviles: empujan y frenan al kart
    dunes.forEach(d=>{
      const dx=kart.position.x-d.mesh.position.x,dz=kart.position.z-d.mesh.position.z;
      const dist=Math.sqrt(dx*dx+dz*dz),min=d.r+0.9;
      if(dist<min&&dist>0.01){
        const nx=dx/dist,nz=dz/dist;
        kart.position.x=d.mesh.position.x+nx*min; kart.position.z=d.mesh.position.z+nz*min;
        kart.userData.speed*=0.5;
        kart.userData.spinTimer=Math.max(kart.userData.spinTimer,0.45);
        if(kart.userData.isPlayer&&now-lastCollSnd>350){
          playCollisionSound(); lastCollSnd=now; vib([50,30,50]);
          showObstaclePopup('🏜️ ¡DUNA!');
        }
      }
    });
  });
}

// ══════════════════════════════════════════
//  POWER-UPS
// ══════════════════════════════════════════
const ITEMS=['🚀','🍌','🟢'];
function checkItemPickup(){
  if(playerItem)return;
  itemBoxes.forEach(box=>{
    if(!box.active)return;
    const dx=playerKart.position.x-box.pos.x,dz=playerKart.position.z-box.pos.z;
    if(Math.sqrt(dx*dx+dz*dz)<2.2){
      box.active=false;box.group.visible=false;box.respawnTimer=6;
      playerItem=ITEMS[Math.floor(Math.random()*ITEMS.length)];
      updateItemHUD();playItemGet();
      const el=document.getElementById('itemPopup');el.textContent=playerItem;el.style.display='block';
      el.style.animation='none';void el.offsetWidth;el.style.animation='popIn .4s cubic-bezier(.2,1.5,.5,1)';
      setTimeout(()=>el.style.display='none',1200);
    }
  });
}
function updateItemHUD(){
  const sl=document.getElementById('itemSlot'),lb=document.getElementById('itemLabel');
  if(playerItem){sl.textContent=playerItem;sl.classList.add('ready');lb.style.display='block';}
  else{sl.textContent='🎁';sl.classList.remove('ready');lb.style.display='none';}
  const jib=document.getElementById('joyItemBtn');if(jib)jib.textContent=playerItem||'🎁';
}
function activateItem(){
  if(!playerItem)return;
  const item=playerItem;playerItem=null;updateItemHUD();
  if(item==='🚀'){
    playBoostSound();playerKart.userData.maxSpeed=playerKart.userData.baseMaxSpeed*1.7;playerKart.userData.boostTimer=3;
    document.getElementById('boostBar').style.display='block';
  }else if(item==='🍌'){
    const u=playerKart.userData;
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,8),new THREE.MeshLambertMaterial({color:0xFFDD00}));
    const bx=playerKart.position.x-Math.sin(u.angle)*2.5,bz=playerKart.position.z-Math.cos(u.angle)*2.5;
    mesh.position.set(bx,0.5,bz);scene.add(mesh);bananas.push({mesh,pos:new THREE.Vector3(bx,0.5,bz)});
    playBeep(300,0.15,0.2);
  }else if(item==='🟢'){
    const u=playerKart.userData;
    const mesh=new THREE.Mesh(new THREE.SphereGeometry(0.4,10,10),new THREE.MeshLambertMaterial({color:0x22FF44}));
    mesh.position.copy(playerKart.position);mesh.position.y=0.6;scene.add(mesh);
    shells.push({mesh,vx:Math.sin(u.angle)*0.7,vz:Math.cos(u.angle)*0.7,life:3});
    playBeep(600,0.1,0.25);
  }
}
function updateProjectiles(dt){
  bananas.forEach((b,i)=>{
    karts.forEach(k=>{const dx=k.position.x-b.pos.x,dz=k.position.z-b.pos.z;if(Math.sqrt(dx*dx+dz*dz)<1.6){k.userData.spinTimer=1.5;playBeep(150,0.2,0.3);vib([50]);scene.remove(b.mesh);bananas.splice(i,1);}});
  });
  shells.forEach((s,i)=>{
    s.mesh.position.x+=s.vx;s.mesh.position.z+=s.vz;s.mesh.rotation.y+=0.2;s.life-=dt;let hit=false;
    karts.forEach(k=>{if(k===playerKart)return;const dx=k.position.x-s.mesh.position.x,dz=k.position.z-s.mesh.position.z;if(Math.sqrt(dx*dx+dz*dz)<1.8){k.userData.speed*=-0.6;k.userData.spinTimer=2;playCollisionSound();hit=true;}});
    if(s.life<=0||hit){scene.remove(s.mesh);shells.splice(i,1);}
  });
}

// ══════════════════════════════════════════
//  CÁMARA
// ══════════════════════════════════════════
const smoothCam=new THREE.Vector3();
function updateCamera(){
  if(!playerKart)return;
  const u=playerKart.userData;
  const target=new THREE.Vector3(playerKart.position.x+Math.sin(u.angle)*-9,playerKart.position.y+5.5,playerKart.position.z+Math.cos(u.angle)*-9);
  smoothCam.lerp(target,0.09);camera.position.copy(smoothCam);
  camera.lookAt(playerKart.position.x,playerKart.position.y+1.2,playerKart.position.z);
}

// ══════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════
function isWrongWay(){
  if(!playerKart)return false;
  const u=playerKart.userData;
  if(Math.abs(u.speed)<0.04)return false;
  const wp=WAYPTS[u.wpIdx],wpN=WAYPTS[(u.wpIdx+1)%TRACK_SEGS];
  const fwdX=wpN.x-wp.x,fwdZ=wpN.z-wp.z;
  const len=Math.sqrt(fwdX*fwdX+fwdZ*fwdZ);
  const dot=(Math.sin(u.angle)*fwdX+Math.cos(u.angle)*fwdZ)/len;
  return dot<-0.45;
}

function updateHUD(){
  if(!playerKart)return;
  const u=playerKart.userData;
  document.getElementById('kmh').textContent=Math.round(Math.abs(u.speed)*420);
  document.getElementById('lapNum').textContent=Math.min(u.lap+2,3);
  const ms=Date.now()-raceStart,m=Math.floor(ms/60000),s=((ms%60000)/1000).toFixed(2).padStart(5,'0');
  document.getElementById('timerBox').textContent=`⏱ ${m}:${s}`;
  let pos=1;const myScore=u.lap*TRACK_SEGS+u.wpIdx;
  karts.forEach(k=>{if(k!==playerKart&&k.userData.lap*TRACK_SEGS+k.userData.wpIdx>myScore)pos++;});
  document.getElementById('posBox').textContent=pos+'°';
  document.getElementById('wrongWayBanner').style.display=isWrongWay()?'block':'none';
  drawMinimap();
  karts.forEach(kart=>{kart.children.forEach(c=>{if(c.userData.isNameTag)c.lookAt(camera.position);});});
  checkItemPickup();
}

function showObstaclePopup(txt){
  const el=document.getElementById('obstaclePopup');
  el.textContent=txt; el.style.display='block';
  el.style.animation='none'; void el.offsetWidth;
  el.style.animation='popIn .35s cubic-bezier(.2,1.5,.5,1)';
  setTimeout(()=>el.style.display='none',1100);
}

function drawMinimap(){
  const c=document.getElementById('minimapBox'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,120,120);
  ctx.fillStyle='rgba(0,0,0,.65)';ctx.beginPath();ctx.arc(60,60,58,0,Math.PI*2);ctx.fill();
  const sc=0.68;
  ctx.strokeStyle='#555';ctx.lineWidth=7;ctx.beginPath();WAYPTS.forEach((p,i)=>{const x=60+p.x*sc,y=60+p.z*sc;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.closePath();ctx.stroke();
  ctx.strokeStyle='#888';ctx.lineWidth=4;ctx.beginPath();WAYPTS.forEach((p,i)=>{const x=60+p.x*sc,y=60+p.z*sc;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.closePath();ctx.stroke();
  karts.forEach(k=>{const cx=60+k.position.x*sc,cy=60+k.position.z*sc,ch=CHARS[k.userData.charIdx];ctx.fillStyle=ch.hex;ctx.beginPath();ctx.arc(cx,cy,k.userData.isPlayer?5.5:3.5,0,Math.PI*2);ctx.fill();if(k.userData.isPlayer){ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();}});
}

// ══════════════════════════════════════════
//  MENÚ
// ══════════════════════════════════════════
function buildMenu(){
  // Track select
  const tg=document.getElementById('trackSelect');tg.innerHTML='';
  TRACKS.forEach((tr,i)=>{
    const div=document.createElement('div');div.className='trackCard'+(i===0?' sel':'');
    div.innerHTML=`<span class="trackEmoji">${tr.emoji}</span><div class="trackName">${tr.name}</div><div class="trackDesc">${tr.desc}</div>`;
    div.addEventListener('click',()=>{document.querySelectorAll('.trackCard').forEach(c=>c.classList.remove('sel'));div.classList.add('sel');selectedTrack=i;});
    tg.appendChild(div);
  });

  // Char select
  const grid=document.getElementById('charGrid');grid.innerHTML='';
  CHARS.forEach((ch,i)=>{
    const best=LS.getBest(i);
    const div=document.createElement('div');div.className='charCard'+(i===0?' sel':'');
    div.innerHTML=`<div class="charAv" style="background:${ch.hex}" id="cav${i}">${ch.initial}</div><div class="charName">${ch.name}</div><div class="charBest">${best?'⏱ '+LS.fmt(best):'Sin récord'}</div>`;
    div.addEventListener('click',()=>{document.querySelectorAll('.charCard').forEach(c=>c.classList.remove('sel'));div.classList.add('sel');selectedChar=i;});
    grid.appendChild(div);
    const img=new Image();img.onload=()=>{const av=document.getElementById('cav'+i);if(av){av.innerHTML='';const im=img.cloneNode();im.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';av.appendChild(im);}};img.src=ch.photo;
  });

  document.getElementById('btnStart').addEventListener('click',()=>{
    initAudio();
    clearScene();
    const cfg=TRACKS[selectedTrack];
    applySky(cfg.sky);
    buildTrack(cfg);
    buildEnvironment(cfg);
    buildItemBoxes();
    if(cfg.hasObstacles) buildTrackObstacles();
    document.getElementById('menu').style.display='none';
    spawnKarts(selectedChar);
    startCountdown();
  });

  document.getElementById('btnRestart').addEventListener('click',()=>{
    document.getElementById('podiumScreen').style.display='none';
    document.getElementById('hud').style.display='none';
    showMobileControls(false); // ocultar controles al volver al menú
    buildMenu();
    document.getElementById('menu').style.display='flex';
    state='menu';playerItem=null;updateItemHUD();
    if(bgInterval){clearInterval(bgInterval);bgInterval=null;}
    if(audioCtx){audioCtx.close();audioCtx=null;engineOsc=null;engineGain=null;}
  });
}

function clearScene(){
  // Limpiar objetos dinámicos (pista, árboles, etc.)
  const keep=new Set();
  scene.children.forEach(obj=>{
    if(obj===ambientLight||obj===sun||obj===hemiLight)keep.add(obj);
  });
  scene.children.filter(o=>!keep.has(o)).forEach(o=>scene.remove(o));
  obstacleObjects=[];dunes=[];_treeTex=null;_cactusTex=null;itemBoxes=[];karts=[];bananas=[];shells=[];
}

// ══════════════════════════════════════════
//  CUENTA REGRESIVA
// ══════════════════════════════════════════
function startCountdown(){
  state='countdown';
  showMobileControls(true); // mostrar flechas y botones al iniciar
  const el=document.getElementById('countdown');el.style.display='block';el.style.color='#fff';
  let n=3;el.textContent=n;playBeep(440,0.25,0.4);
  const tick=setInterval(()=>{
    n--;
    if(n===0){
      el.textContent='¡GO!';el.style.color='#00ff44';playBeep(880,0.4,0.5);clearInterval(tick);
      setTimeout(()=>{el.style.display='none';el.style.color='#fff';state='racing';raceStart=Date.now();document.getElementById('hud').style.display='block';karts.forEach(k=>{k.userData.lap=0;});updateItemHUD();},900);
    }else{
      el.textContent=n;el.style.animation='none';void el.offsetWidth;el.style.animation='popIn .45s cubic-bezier(.2,1.5,.5,1)';playBeep(440,0.2,0.35);
    }
  },1000);
}

// ══════════════════════════════════════════
//  PODIO
// ══════════════════════════════════════════
function resolveRace(){
  state='finished';
  playFinishFanfare();

  // Ordenar karts por progreso (lap × segs + wpIdx)
  const sorted=[...karts].sort((a,b)=>{
    const sa=a.userData.lap*TRACK_SEGS+a.userData.wpIdx;
    const sb=b.userData.lap*TRACK_SEGS+b.userData.wpIdx;
    return sb-sa;
  });

  // Tiempo del jugador
  const playerTime=Date.now()-raceStart;
  const isNewRecord=LS.setBest(playerKart.userData.charIdx,playerTime);

  const medals=['🥇','🥈','🥉','💨'];
  const blockClass=['p1','p2','p3'];

  // Construir podio HTML
  const stage=document.getElementById('podiumStage');stage.innerHTML='';
  // Reordenar visualmente: 2° izq, 1° centro, 3° der
  const podOrder=[sorted[1],sorted[0],sorted[2]];
  const podClass=['p2','p1','p3'];
  const podLabel=['2°','1°','3°'];

  podOrder.forEach((k,vi)=>{
    if(!k)return;
    const ch=CHARS[k.userData.charIdx];
    const timeMs=k.userData.finishTime||(k.userData.lap>=3?Date.now()-raceStart:null);
    const timeStr=timeMs?LS.fmt(timeMs):'--:--.--';
    const slot=document.createElement('div');slot.className='podSlot';
    slot.innerHTML=`
      <div class="podAv" id="podAv_${vi}" style="background:${ch.hex}">${ch.initial}</div>
      <div class="podName" style="color:${ch.hex}">${ch.name}</div>
      <div class="podTime">${timeStr}</div>
      <div class="podBlock ${podClass[vi]}" style="border-top:4px solid ${ch.hex}">${podLabel[vi]}</div>`;
    stage.appendChild(slot);
    // Cargar foto real del personaje
    const pImg=new Image();pImg.onload=()=>{
      const av=document.getElementById('podAv_'+vi);
      if(av){av.innerHTML='';const im=document.createElement('img');im.src=pImg.src;av.appendChild(im);}
    };pImg.src=ch.photo;
  });

  // 4° lugar
  if(sorted[3]){
    const ch=CHARS[sorted[3].userData.charIdx];
    document.getElementById('pod4Row').textContent=`4° ${ch.name} 💨`;
  }

  // Nuevo récord
  document.getElementById('podNewRecord').textContent=isNewRecord?'🏆 ¡NUEVO RÉCORD PERSONAL!':'';

  // Mostrar flash de récord
  if(isNewRecord){
    const rf=document.getElementById('recordFlash');rf.style.display='block';
    setTimeout(()=>rf.style.display='none',2500);
  }

  document.getElementById('podiumScreen').style.display='flex';
  document.getElementById('hud').style.display='none';
  showMobileControls(false); // ocultar controles en pantalla de podio
}

// ══════════════════════════════════════════
//  LOOP PRINCIPAL
// ══════════════════════════════════════════
let lastT=0;
function animate(t){
  requestAnimationFrame(animate);
  const dt=Math.min((t-lastT)/1000,0.05);lastT=t;
  if(state==='racing'){
    updateDunes(t);
    updatePlayerKart(dt);
    karts.forEach(k=>{if(!k.userData.isPlayer)updateAI(k,dt);});
    checkKartCollisions();checkObstacleCollisions();
    updateItemBoxes(dt);updateProjectiles(dt);
    updateCamera();updateHUD();
  }else if(state==='countdown'){updateDunes(t);updateCamera();}
  renderer.render(scene,camera);
}

})();
animate(0);
